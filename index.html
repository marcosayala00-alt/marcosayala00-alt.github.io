  <title>Siderita — Próximamente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
  <link href="./Siderita — Próximamente_files/css2" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #A0763A;
      --gold-light: #C9A96E;
      --dark: #FAF8F5;
      --cream: #1A1A17;
      --gray: #888880;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vw;
      height: 80vh;
      background: radial-gradient(ellipse at center, rgba(201,169,110,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 4rem 2rem;
    }

    .ornament-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }
    .ornament-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }

    .corner {
      position: absolute;
      width: 36px; height: 36px;
      opacity: 0.25;
    }
    .corner-tl { top: 2rem; left: 2rem; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-tr { top: 2rem; right: 2rem; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner-bl { bottom: 2rem; left: 2rem; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-br { bottom: 2rem; right: 2rem; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    .logo-wrap {
      margin-bottom: 3.5rem;
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
      animation-delay: 0.2s;
    }
    .logo-wrap img {
      filter: invert(1);
      width: clamp(200px, 38vw, 360px);
      display: block;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 2.8rem;
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
      animation-delay: 0.5s;
    }
    .divider-line { width: 55px; height: 1px; background: var(--gold); opacity: 0.45; }
    .divider-diamond { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); opacity: 0.75; }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 4.5vw, 3.6rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream);
      text-align: center;
      line-height: 1.2;
      margin-bottom: 1.4rem;
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
      animation-delay: 0.7s;
    }
    .headline em {
      font-style: italic;
      color: var(--gold-light);
    }

    .subtext {
      font-weight: 200;
      font-size: clamp(0.65rem, 1.4vw, 0.8rem);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--gray);
      text-align: center;
      margin-bottom: 4rem;
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
      animation-delay: 0.9s;
    }

    .notify-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
      animation-delay: 1.1s;
    }
    .notify-label {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 300;
    }
    .input-row {
      display: flex;
      width: 100%;
      border: 1px solid rgba(160,118,58,0.3);
      background: transparent;
      transition: border-color 0.3s;
    }
    .input-row:focus-within {
      border-color: rgba(160,118,58,0.7);
    }
    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.85rem 1.2rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: var(--cream);
    }
    .input-row input::placeholder {
      color: rgba(26,26,23,0.35);
      letter-spacing: 0.15em;
    }
    .input-row button {
      background: var(--gold);
      border: none;
      padding: 0.85rem 1.4rem;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.63rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #FAF8F5;
      transition: background 0.3s;
      white-space: nowrap;
    }
    .input-row button:hover { background: var(--gold-light); }

    .success-msg {
      display: none;
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
    }

    .footer {
      position: absolute;
      bottom: 2.2rem;
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(136,136,128,0.6);
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
      animation-delay: 1.4s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .corner { width: 22px; height: 22px; }
      .corner-tl, .corner-tr { top: 1rem; }
      .corner-tl, .corner-bl { left: 1rem; }
      .corner-tr, .corner-br { right: 1rem; }
      .corner-bl, .corner-br { bottom: 1rem; }
    }
      .input-row { border-color: rgba(201,169,110,0.28) !important; }
      .input-row:focus-within { border-color: rgba(201,169,110,0.65) !important; }
      .input-row input::placeholder { color: rgba(245,240,232,0.28) !important; }
      .input-row button { color: #0D0D0B !important; }
      .footer { color: rgba(136,136,128,0.35) !important; }
    }
  </style>
</head>

  <script>
    async function handleSubmit() {
      const email = document.getElementById('email').value;
      if (!email || !email.includes('@')) {
        document.querySelector('.input-row').style.borderColor = 'rgba(160,118,58,0.8)';
        return;
      }
      try {
        const response = await fetch('https://formspree.io/f/mgorjgdy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });
        if (response.ok) {
          document.getElementById('form-row').style.display = 'none';
          document.querySelector('.notify-label').style.display = 'none';
          document.getElementById('success').style.display = 'block';
        } else {
          document.querySelector('.input-row').style.borderColor = 'rgba(160,118,58,0.8)';
        }
      } catch(e) {
        document.querySelector('.input-row').style.borderColor = 'rgba(160,118,58,0.8)';
      }
    }
  </script>
